<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" id="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#43a047" />
  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Tasfer</title>
  <!--
    Resolve the language once, before the browser fetches the manifest and
    before first paint, and use it for both things that would otherwise be
    English-only until the app boots:

      - the manifest href, so the install prompt and the home-screen label are
        translated. The manifest format has no per-locale fields, so there is
        one file per language (generated by scripts/gen-manifest.mjs) and the
        href picks between them.
      - documentElement lang/dir, so the loading screen below isn't laid out
        LTR for an Arabic reader.

    Must run inline and ahead of any module for both to land in time. The lookup
    mirrors i18next-browser-languagedetector's order (see src/i18n.ts:
    querystring -> cookie "locale" -> localStorage -> navigator) so this guess
    matches the language i18next settles on and nothing reflows once it does.
    src/main.tsx takes over from there.
  -->
  <script>
    (function(){
      var lng="";
      try{
        lng=new URLSearchParams(location.search).get("lng")
          ||decodeURIComponent((document.cookie.match(/(?:^|;\s*)locale=([^;]*)/)||[])[1]||"")
          ||localStorage.getItem("i18nextLng")
          ||navigator.language
          ||"";
      }catch(e){}
      var isAr=lng.toLowerCase().split("-")[0]==="ar";
      var r=document.documentElement;
      r.lang=isAr?"ar":"en";
      r.dir=isAr?"rtl":"ltr";
      if(isAr)document.getElementById("manifest").href="/manifest.ar.json";
    })()
  </script>
  <!-- Apply dark class BEFORE styles.css so all CSS variables resolve to the correct theme immediately -->
  <script>
    (function(){
      var t=localStorage.getItem("theme");
      var isDark=t==="dark"||(t!=="light"&&window.matchMedia("(prefers-color-scheme:dark)").matches);
      if(isDark)document.documentElement.classList.add("dark");
    })()
  </script>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div id="electron-menubar" style="display:none"></div>
  <div id="root">
    <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100dvh;width:100%">
      <img id="loading-spinner" src="/spinner.png" alt="Loading..." width="32" height="32"
        style="animation:spin 1s linear infinite" />
    </div>
    <style>
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    <script>
      (function(){
        /* The locale bundles load over HTTP, far too late for this pre-hydration
           spinner, so `common.loading` is inlined here for the two shipped
           languages. Keep in sync with the files under public/app/locales. */
        if(document.documentElement.lang==="ar"){
          document.getElementById("loading-spinner").alt="جارٍ التحميل...";
        }

        /* Electron on Windows/Linux: show menubar early to avoid flash + fix scrollbar */
        if(window.tasfer&&window.tasfer.platform!=="darwin"){
          var mb=document.getElementById("electron-menubar");
          mb.style.display="block";
          mb.style.height="36px";
          mb.style.webkitAppRegion="drag";
          document.getElementById("loading").style.height="calc(100dvh - 36px)";
          document.documentElement.style.overflow="hidden";
        }
      })()
    </script>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
