appId: com.tasfer.desktop
productName: Tasfer

publish:
  provider: github
  owner: hamza512b
  repo: tasfer

directories:
  output: release

asar: true

files:
  - out/**
  - package.json
  - resources/**

extraResources:
  - from: ../web/dist
    to: web

icon: resources/icon.png

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

win:
  icon: resources/icon.ico
  target: nsis

nsis:
  oneClick: true
  perMachine: false

linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
    - pacman
  category: Office

pacman:
  # Pin runtime deps explicitly. electron-builder's auto-detected list
  # includes http-parser, which Arch dropped from its repos and which the
  # Electron binary no longer links against, making the package
  # uninstallable. Keep this list in sync with the binary's real needs.
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
    - libappindicator-gtk3
