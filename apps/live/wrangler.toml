name = "cypher-signal"
main = "src/worker.ts"
compatibility_date = "2025-03-01"

# Custom domain — requires cypher.md zone in Cloudflare DNS
routes = [
  { pattern = "signaling.cypher.md", custom_domain = true }
]

[vars]
# Cloudflare Calls TURN key ID — get from: CF Dashboard → Calls → TURN → Create Key
# Set the secret token via: wrangler secret put TURN_API_TOKEN
TURN_KEY_ID = "1f35a92cf25e752529a313b7404a5a47"

[durable_objects]
bindings = [
  { name = "SIGNAL_ROOM", class_name = "SignalRoom" }
]

# Caps TURN credential minting per client IP. Credentials are usable for
# arbitrary relayed traffic and are billed to this account, so the endpoint is
# rate-limited on top of requiring the caller to name a topic.
[[ratelimits]]
name = "TURN_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[migrations]]
tag = "v1"
new_classes = ["SignalRoom"]
