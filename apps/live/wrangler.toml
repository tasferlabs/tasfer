name = "tasfer-signal"
main = "src/worker.ts"
compatibility_date = "2025-03-01"

# Custom domain — requires tasfer.app zone in Cloudflare DNS
routes = [
  { pattern = "signaling.tasfer.app", custom_domain = true }
]

# Cloudflare Calls TURN credentials — get from: CF Dashboard → Calls → TURN → Create Key.
# Both are secrets, kept out of the repo. Set each on the deployed Worker:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_API_TOKEN
# For local dev, put both in apps/live/.dev.vars (gitignored).

[durable_objects]
bindings = [
  { name = "SIGNAL_ROOM", class_name = "SignalRoom" }
]

# Caps TURN credential minting per client IP. Credentials are usable for
# arbitrary relayed traffic and are billed to this account, so the endpoint is
# rate-limited on top of requiring the caller to name a topic.
[[ratelimits]]
name = "TURN_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[migrations]]
tag = "v1"
new_classes = ["SignalRoom"]
