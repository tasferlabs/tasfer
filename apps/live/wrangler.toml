name = "cypher-signal"
main = "src/worker.ts"
compatibility_date = "2025-03-01"

# Custom domain — requires cypher.md zone in Cloudflare DNS
routes = [
  { pattern = "signaling.cypher.md", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "SIGNAL_ROOM", class_name = "SignalRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["SignalRoom"]
