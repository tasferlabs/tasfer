version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/apps/web"
      - "/apps/desktop"
      - "/apps/live"
      - "/packages/editor"
      - "/packages/provider-core"
      - "/packages/provider-indexeddb"
      - "/packages/provider-relay"
      - "/packages/provider-webrtc"
      - "/packages/react"
      - "/packages/tex"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
