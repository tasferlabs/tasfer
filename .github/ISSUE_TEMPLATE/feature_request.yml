name: Feature request
description: Propose an improvement to Cypher.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem and the user outcome you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user, I struggle with ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or prior art.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, references, constraints, tradeoffs.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This request aligns with Cypher's local-first and privacy-respecting goals.
          required: false
