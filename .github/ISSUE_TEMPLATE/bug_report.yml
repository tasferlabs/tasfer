name: Bug report
description: Report a reproducible problem in Cypher.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue and impact.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web
        - Desktop (Electron)
        - iOS
        - Android
        - Signaling server
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: App version, commit SHA, or branch.
      placeholder: e.g. 0.1.0 or main@abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste logs and drag/drop screenshots if available.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I can reproduce this on the latest main branch.
          required: false
        - label: This is not a security report (those must use SECURITY.md).
          required: true
