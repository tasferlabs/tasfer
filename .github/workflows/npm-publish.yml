name: npm Publish

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: packages/*/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install
        run: |
          for p in tex editor provider-core provider-indexeddb provider-relay provider-webrtc react; do
            (cd "packages/$p" && npm ci)
          done

      - name: Build in dependency order
        run: bash packages/build-all.sh

      - name: Pin intra-repo peer ranges
        run: node scripts/release/pin-peer-ranges.mjs

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          for p in tex editor provider-core provider-indexeddb provider-relay provider-webrtc react; do
            cd "packages/$p"
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if npm view "$name@$version" version > /dev/null 2>&1; then
              echo "▸ $name@$version already published, skipping"
            elif [ "$DRY_RUN" = "true" ]; then
              echo "▸ dry-run publish $name@$version"
              npm publish --dry-run
            else
              echo "▸ publishing $name@$version"
              npm publish
            fi
            cd ../..
          done
