name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: packages/*/package-lock.json

      - name: Install
        run: |
          for p in tex editor provider-core provider-indexeddb provider-relay provider-webrtc react; do
            (cd "packages/$p" && npm ci)
          done

      - name: Build in dependency order
        run: bash packages/build-all.sh

      - name: Test
        run: |
          for p in tex editor provider-core; do
            (cd "packages/$p" && npm test)
          done

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/*/package-lock.json

      # web's postinstall also installs the source-aliased packages/*
      - name: Install
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Test
        working-directory: apps/web
        run: npm test

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/site/package-lock.json

      - name: Install
        working-directory: apps/site
        run: npm ci

      - name: Build
        working-directory: apps/site
        run: npm run build

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install
        working-directory: apps/desktop
        run: npm ci

      - name: Build (compile only, no packaging)
        working-directory: apps/desktop
        run: npm run build

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/*/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # web's postinstall also installs the source-aliased packages/*;
      # the Gradle preBuild task then builds + syncs the web bundle itself.
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      # capacitor-cordova-android-plugins is gitignored and must exist before
      # Gradle configuration; the in-build sync only runs `cap copy`.
      - name: Generate Capacitor Android project
        working-directory: apps/web
        run: npx cap update android

      - name: Build
        working-directory: apps/android
        run: ./gradlew assembleDebug

      # The build above already ran build-and-sync.sh; skip the rebuild.
      - name: Lint
        working-directory: apps/android
        env:
          TASFER_SKIP_WEB_BUILD: "1"
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-lint-report
          path: apps/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/live/package-lock.json

      - name: Install
        working-directory: apps/live
        run: npm ci

      - name: Typecheck
        working-directory: apps/live
        run: npx tsc --noEmit

      - name: Validate worker bundle
        working-directory: apps/live
        run: npx wrangler deploy --dry-run
