name: Deploy Signaling Worker

on:
  push:
    branches: [main]
    paths:
      - "apps/live/**"
  workflow_dispatch:

concurrency:
  group: live-deploy

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/live/package-lock.json

      - name: Install
        working-directory: apps/live
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/live
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
