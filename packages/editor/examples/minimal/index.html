<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>@cypherkit/editor — minimal example</title>
    <style>
      :root {
        color-scheme: light dark;
        /* The renderer reads a handful of CSS variables off :root so the host
           controls theming. These are the ones the default styles look for. */
        --editor-text: #1a1a1a;
        --editor-bg: #ffffff;
        --editor-selection: rgba(64, 120, 255, 0.25);
        --editor-cursor: #1a1a1a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--editor-bg);
        color: var(--editor-text);
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      #toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.25);
        flex: 0 0 auto;
        flex-wrap: wrap;
      }
      #toolbar .sep {
        width: 1px;
        align-self: stretch;
        background: rgba(128, 128, 128, 0.3);
        margin: 2px 2px;
      }
      #toolbar button {
        font: inherit;
        padding: 6px 12px;
        border: 1px solid rgba(128, 128, 128, 0.35);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      #toolbar button:hover { background: rgba(128, 128, 128, 0.12); }
      /* Active format state, painted from editor.getActiveFormats(). */
      #toolbar button.is-active {
        background: var(--editor-selection);
        border-color: rgba(64, 120, 255, 0.55);
      }

      /* The editor fills whatever box you give it and observes its size. */
      #editor {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        max-width: 740px;
        width: 100%;
        margin: 0 auto;
      }

      /* Live read-model: word count + selection state + active formats. */
      #status {
        flex: 0 0 auto;
        display: flex;
        gap: 10px;
        padding: 6px 14px;
        border-top: 1px solid rgba(128, 128, 128, 0.25);
        font-size: 13px;
        opacity: 0.75;
        font-variant-numeric: tabular-nums;
      }
      #status .spacer { flex: 1 1 auto; }
    </style>
  </head>
  <body>
    <!-- data-editor-overlay tells the editor's focus tracking not to steal
         focus away when you click these buttons (see the README walkthrough). -->
    <div id="toolbar" data-editor-overlay>
      <!-- Tier-B commands namespace -->
      <button id="bold" title="Toggle bold — editor.commands.toggleMark('bold')"><strong>B</strong></button>
      <button id="h1" title="Heading 1 — editor.commands.setBlock('heading1')">H1</button>
      <button id="bullet" title="Bullet list — editor.commands.setBlock('bullet_list')">• List</button>
      <span class="sep"></span>
      <button id="undo" title="Undo — editor.commands.undo()">Undo</button>
      <button id="redo" title="Redo — editor.commands.redo()">Redo</button>
      <span class="sep"></span>
      <!-- chain(): several commands committed as ONE undoable step -->
      <button id="section" title="Insert a section heading + text in one undoable step — editor.chain()…run()">+ Section</button>
      <button id="clear" title="Replace the document via setMarkdown('') — undoable">Clear</button>
      <button id="save" title="Serialize to Markdown (getMarkdown) → console">Save&nbsp;.md</button>
    </div>

    <div id="editor"></div>

    <div id="status" data-editor-overlay>
      <span id="status-words">0 words</span>
      <span id="status-selection">caret</span>
      <span class="spacer"></span>
      <span id="status-formats"></span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
