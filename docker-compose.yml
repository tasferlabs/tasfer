networks:
  hamza:
    external: true

services:
  cypher:
    build:
      context: ./
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
    environment:
      - NODE_ENV=production
      - PORT=4000
      - API_URL=http://localhost:3000
      - LIVE_URL=http://localhost:8080
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cypher
      - REDIS_URL=redis://cache:6379
      - AUTH_USER=halowaia
      - AUTH_PASS=fatush
    volumes:
      - ./cdn:/app/cdn
    restart: always
    networks:
      - hamza
